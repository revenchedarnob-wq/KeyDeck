name: CI Deep

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  deep:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run deep CI
        shell: pwsh
        run: .\scripts\ci\deep.ps1
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-deep-receipts
          path: |
            receipts/
            docs/PROOF_REGISTRY.*
          if-no-files-found: ignore
