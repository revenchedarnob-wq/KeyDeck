name: ci-deep
on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 0'
permissions:
  contents: read
jobs:
  deep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Deep validation
        shell: pwsh
        run: ./scripts/ci/deep.ps1